name: Wipe Main Branch (Preserve .github & git.zip)

on:
  workflow_dispatch: # Manual trigger for safety

jobs:
  delete-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the deletions back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete Target Files
        run: |
          rm -rf android

      - name: Commit and Push Deletions
        run: |
          git config --local user.email "ethiomark8@gmail.com"
          git config --local user.name "ETHIO MARK8"
          
          # Stage all changes (including deletions)
          git add --all
          
          # Only commit if files were actually deleted
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes needed. The directory is already clean."
          else
            git commit -m "chore: wipe main branch, keeping .github and git.zip"
            git push origin main
          fi
