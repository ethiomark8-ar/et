name: ethioshop
description: EthioShop — Ethiopia's Premier E-Commerce Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.9
  cloud_functions: ^4.5.8

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Functional Programming
  dartz: ^0.10.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.14.0
  badges: ^3.1.2
  lottie: ^2.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # Network
  http: ^1.1.2
  dio: ^5.4.0

  # WebView (for Chapa payment)
  webview_flutter: ^4.4.4

  # Auth
  google_sign_in: ^6.2.1

  # Typography
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2
  timeago: ^3.6.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2

  # Permissions
  permission_handler: ^11.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700