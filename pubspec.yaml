name: ethioshop
description: EthioShop — Ethiopia's Premier E-Commerce Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  # Updated for Flutter 3.41 / Dart 3.11 compatibility
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase (Pinned to Flutter BoM 4.10.0 compatible versions)
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^12.1.0
  firebase_messaging: ^16.0.0
  cloud_functions: ^6.0.0

  # State Management (Riverpod 3.0 Stable)
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Navigation
  go_router: ^14.0.0

  # Functional Programming
  dartz: ^0.10.1 # This library is stable and rarely changes

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.2.0
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.0
  badges: ^3.1.2
  lottie: ^3.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image / Files
  image_picker: ^1.1.0
  file_picker: ^8.0.0

  # Network
  http: ^1.2.1
  dio: ^5.5.0
  webview_flutter: ^4.8.0

  # Auth & Utilities
  google_sign_in: ^6.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  timeago: ^3.6.1
  share_plus: ^10.1.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^3.0.3
  hive_generator: ^2.0.1


flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
