name: ethioshop
description: EthioShop — Ethiopia's Premier E-Commerce Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase (Updated safely with latest stable ecosystem)
  firebase_core: ^4.5.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.1.0
  cloud_functions: ^6.1.0

  # State Management
  flutter_riverpod: ^3.0.5
  riverpod_annotation: ^3.0.5

  # Navigation
  go_router: ^14.2.0

  # Functional Programming
  dartz: ^0.10.1

  # UI
  cached_network_image: ^3.4.2
  shimmer: ^3.0.0
  carousel_slider: ^5.1.0
  flutter_staggered_grid_view: ^0.7.1
  smooth_page_indicator: ^1.2.1
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.1
  badges: ^3.1.3
  lottie: ^3.2.0

  # Local Storage
  hive: ^2.2.4
  hive_flutter: ^1.1.1

  # Image / Files
  image_picker: ^1.1.2
  file_picker: ^8.1.0

  # Network
  http: ^1.2.2
  dio: ^5.6.0
  webview_flutter: ^4.9.0

  # Auth & Utilities
  google_sign_in: ^6.3.0
  google_fonts: ^6.3.0
  intl: ^0.20.2
  uuid: ^4.5.0
  timeago: ^3.7.0
  share_plus: ^10.2.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.4
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.1.0
  build_runner: ^2.4.10
  riverpod_generator: any
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
