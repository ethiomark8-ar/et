name: ethioshop
description: EthioShop — Ethiopia's Premier E-Commerce Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  cloud_functions: ^6.0.7

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^15.1.2

  # Functional Programming
  dartz: ^0.10.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.0
  badges: ^3.1.2
  lottie: ^3.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image
  image_picker: ^1.0.7
  file_picker: ^10.3.10

  # Network
  http: ^1.1.2
  dio: ^5.4.0

  # WebView (for Chapa payment)
  webview_flutter: ^4.4.4

  # Auth
  google_sign_in: ^6.2.1

  # Typography
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  timeago: ^3.6.0
  share_plus: ^12.0.1
  url_launcher: ^6.2.4
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.2

  # Permissions
  permission_handler: ^12.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
